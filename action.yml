name: 'Framework Doctor'
description: 'Scan your Svelte, React, Vue, or Angular project for health issues'
branding:
  icon: 'activity'
  color: 'blue'

inputs:
  directory:
    description: 'Project directory to scan (default: .)'
    required: false
    default: '.'
  format:
    description: 'Output format: text or json'
    required: false
    default: 'text'
  fail-on-low-score:
    description: 'Fail the step if score is below threshold'
    required: false
    default: 'false'
  score-threshold:
    description: 'Minimum score required when fail-on-low-score is true'
    required: false
    default: '0'

runs:
  using: 'composite'
  steps:
    - name: Run Framework Doctor
      run: npx -y @framework-doctor/cli ${{ inputs.directory }} --format ${{ inputs.format }} -y
      shell: bash
